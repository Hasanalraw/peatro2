<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <circle cx="100" cy="100" r="96" fill="#FFFFFF" stroke="#E5E0D8" stroke-width="1.5"/>
  <!-- Decorative inner thin border -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#E5E0D8" stroke-width="0.5" stroke-dasharray="3,3"/>
  
  <!-- Cursive "Pietro" -->
  <text x="100" y="98" 
        font-family="'Playfair Display', 'Cormorant Garamond', 'Georgia', serif" 
        font-style="italic" 
        font-weight="bold" 
        font-size="34" 
        text-anchor="middle" 
        fill="#121212" 
        letter-spacing="1">Pietro</text>
  
  <!-- Subtitle: COFFEE PIZZERIA -->
  <text x="100" y="116" 
        font-family="'Inter', 'Montserrat', 'Helvetica Neue', sans-serif" 
        font-weight="600" 
        font-size="8" 
        text-anchor="middle" 
        fill="#76726B" 
        letter-spacing="3.5">COFFEE PIZZERIA</text>
  
  <!-- Italian Flag Line (Green, White, Red) -->
  <g transform="translate(0, 5)">
    <!-- Green -->
    <rect x="75" y="125" width="16" height="3" fill="#145A32" rx="0.5"/>
    <!-- White -->
    <rect x="91" y="125" width="18" height="3" fill="#FAF8F5" stroke="#E5E0D8" stroke-width="0.5" rx="0.5"/>
    <!-- Red -->
    <rect x="109" y="125" width="16" height="3" fill="#A93226" rx="0.5"/>
  </g>
</svg>
